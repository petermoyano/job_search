services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: job_radar
      POSTGRES_PASSWORD: job_radar
      POSTGRES_DB: job_radar
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U job_radar -d job_radar"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:

